name: Bug Report
description: 버그 리포트
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: "재현 방법 (Steps to Reproduce)"
      description: "버그를 재현하는 단계"
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "기대 동작 (Expected Behavior)"
      description: "정상적으로 동작해야 하는 방식"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "실제 동작 (Actual Behavior)"
      description: "현재 발생하는 문제"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "환경 (Environment)"
      value: |
        - 브라우저:
        - OS:
        - 화면 크기:
  - type: dropdown
    id: area
    attributes:
      label: "영역 (Area)"
      options:
        - builder
        - response
        - analytics
        - export
        - table
        - library
        - infra
        - auth
  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - P0-Critical
        - P1-High
        - P2-Medium
        - P3-Low
